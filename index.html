<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBA Studio — Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  .topbar {
    background: #1a1d27;
    border-bottom: 1px solid #2d3148;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 16px; font-weight: 600; color: #fff; }
  .badge-online {
    font-size: 11px; padding: 3px 10px;
    background: #0f2e1a; color: #4ade80;
    border: 1px solid #166534; border-radius: 20px;
  }
  .topbar-right { font-size: 13px; color: #64748b; }
  #last-update { color: #94a3b8; }

  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 12px;
    padding: 20px 24px;
  }
  .stat-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 600; }
  .stat-value.green { color: #4ade80; }
  .stat-value.red { color: #f87171; }
  .stat-value.white { color: #fff; }

  .section-title {
    font-size: 14px; font-weight: 500; color: #94a3b8;
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .btn-reset {
    font-size: 12px; padding: 4px 12px;
    background: transparent; color: #f87171;
    border: 1px solid #7f1d1d; border-radius: 6px;
    cursor: pointer;
  }
  .btn-reset:hover { background: #7f1d1d22; }

  .device-table {
    width: 100%; border-collapse: collapse;
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 12px;
    overflow: hidden;
  }
  .device-table th {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em; color: #64748b;
    padding: 12px 16px; text-align: left;
    border-bottom: 1px solid #2d3148;
    background: #13151f;
  }
  .device-table td {
    padding: 14px 16px;
    font-size: 13px;
    border-bottom: 1px solid #1e2235;
    vertical-align: middle;
  }
  .device-table tr:last-child td { border-bottom: none; }
  .device-table tr:hover td { background: #1e2235; }

  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 8px;
  }
  .status-dot.online { background: #4ade80; box-shadow: 0 0 6px #4ade8066; }
  .status-dot.offline { background: #64748b; }

  .pill {
    font-size: 11px; padding: 2px 10px;
    border-radius: 20px; display: inline-block;
  }
  .pill.online { background: #0f2e1a; color: #4ade80; border: 1px solid #166534; }
  .pill.offline { background: #1e2235; color: #64748b; border: 1px solid #334155; }

  .device-id { font-family: monospace; font-size: 12px; color: #94a3b8; }
  .device-name { font-weight: 500; color: #e2e8f0; }
  .device-ip { font-size: 12px; color: #64748b; }
  .ago { font-size: 12px; color: #64748b; }

  .empty-state {
    text-align: center; padding: 60px 24px;
    color: #64748b; font-size: 14px;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

  .refresh-bar {
    height: 2px; background: #2d3148;
    border-radius: 2px; margin-bottom: 20px;
    overflow: hidden;
  }
  .refresh-progress {
    height: 100%; background: #3b82f6;
    border-radius: 2px;
    transition: width 0.1s linear;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">RBA Studio</span>
    <span class="badge-online">Server Online</span>
  </div>
  <div class="topbar-right">
    Auto-refresh: <span id="last-update">—</span>
  </div>
</div>

<div class="container">

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Terdaftar</div>
      <div class="stat-value white" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Online Sekarang</div>
      <div class="stat-value green" id="stat-online">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Offline</div>
      <div class="stat-value red" id="stat-offline">—</div>
    </div>
  </div>

  <div class="refresh-bar">
    <div class="refresh-progress" id="progress-bar" style="width:100%"></div>
  </div>

  <div class="section-title">
    <span>Daftar Device</span>
    <button class="btn-reset" onclick="resetDevices()">Reset Semua</button>
  </div>

  <table class="device-table">
    <thead>
      <tr>
        <th>Status</th>
        <th>Nama Device</th>
        <th>Device ID</th>
        <th>IP Address</th>
        <th>Terakhir Aktif</th>
      </tr>
    </thead>
    <tbody id="device-tbody">
      <tr><td colspan="5"><div class="empty-state"><div class="icon">📡</div>Memuat data...</div></td></tr>
    </tbody>
  </table>

</div>

<script>
const REFRESH_MS = 5000;
let progressInterval;

function formatAgo(seconds) {
  if (seconds < 5) return "Baru saja";
  if (seconds < 60) return `${seconds} dtk lalu`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)} mnt lalu`;
  return `${Math.floor(seconds / 3600)} jam lalu`;
}

async function fetchDevices() {
  try {
    const res = await fetch("/devices");
    const data = await res.json();

    document.getElementById("stat-total").textContent = data.summary.total;
    document.getElementById("stat-online").textContent = data.summary.online;
    document.getElementById("stat-offline").textContent = data.summary.offline;

    const tbody = document.getElementById("device-tbody");

    if (data.devices.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
        <div class="icon">📡</div>
        Belum ada device terdaftar. Kirim POST ke <code>/online</code> dari device Anda.
      </div></td></tr>`;
      return;
    }

    // Sort: online dulu
    const sorted = data.devices.sort((a, b) => {
      if (a.status === b.status) return 0;
      return a.status === "online" ? -1 : 1;
    });

    tbody.innerHTML = sorted.map(d => `
      <tr>
        <td>
          <span class="status-dot ${d.status}"></span>
          <span class="pill ${d.status}">${d.status === "online" ? "Online" : "Offline"}</span>
        </td>
        <td class="device-name">${escHtml(d.name || d.deviceId)}</td>
        <td class="device-id">${escHtml(d.deviceId)}</td>
        <td class="device-ip">${escHtml(d.ip || "—")}</td>
        <td class="ago">${formatAgo(d.lastSeenAgo)}</td>
      </tr>
    `).join("");

    const now = new Date().toLocaleTimeString("id-ID");
    document.getElementById("last-update").textContent = now;

  } catch (err) {
    console.error("Gagal fetch devices:", err);
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function resetDevices() {
  if (!confirm("Reset semua data device? Tindakan ini tidak bisa dibatalkan.")) return;
  await fetch("/devices", { method: "DELETE" });
  fetchDevices();
}

function startProgressBar() {
  clearInterval(progressInterval);
  const bar = document.getElementById("progress-bar");
  let pct = 100;
  const step = 100 / (REFRESH_MS / 100);
  bar.style.width = "100%";
  progressInterval = setInterval(() => {
    pct -= step;
    if (pct <= 0) {
      pct = 100;
      fetchDevices();
    }
    bar.style.width = pct + "%";
  }, 100);
}

fetchDevices();
startProgressBar();
</script>
</body>
</html>
